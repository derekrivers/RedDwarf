<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RedDwarf Control</title>
    <script>
      const storedTheme = window.sessionStorage.getItem("reddwarf-dashboard-theme");
      document.documentElement.setAttribute(
        "data-bs-theme",
        storedTheme === "light" ? "light" : "dark"
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
