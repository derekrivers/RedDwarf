name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Create env file from example
        run: cp .env.example .env

      - name: Validate policy-pack structure
        run: pnpm validate:policy-pack

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify packaged policy-pack
        run: pnpm verify:package

      - name: Validate Docker Compose
        run: docker compose -f infra/docker/docker-compose.yml config