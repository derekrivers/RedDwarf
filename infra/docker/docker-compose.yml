services:
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.4.23}
    restart: unless-stopped
    profiles:
      - openclaw
    command:
      - sh
      - -lc
      - |
        mkdir -p /home/node/.openclaw
        if [ ! -s /home/node/.openclaw/openclaw.json ]; then
          cp /etc/openclaw/openclaw.json /home/node/.openclaw/openclaw.json
        fi
        exec node openclaw.mjs gateway --allow-unconfigured
    environment:
      # ── Model API keys (required for agent LLM calls) ──────────────
      # These reference OPENCLAW_*_API_KEY proxy vars — NOT the raw keys —
      # so `scripts/lib/config.mjs::applyOpenClawApiKeyScope` can scope them
      # down to only the keys the active provider actually needs (F-157).
      # Rules (see the helper doc for the full matrix):
      #   provider=anthropic  → Anthropic only
      #   provider=openai     → OpenAI only
      #   provider=openai-codex (no failover) → neither; Codex OAuth is the only path
      #   failover enabled    → both (opt-in via REDDWARF_MODEL_FAILOVER_ENABLED)
      # When compose is run without start-stack/setup having set the proxies,
      # both keys are empty — the container starts with no direct-API access
      # and any dispatch falls back to OAuth-only routing. Always prefer
      # `corepack pnpm start` for correct scoping.
      ANTHROPIC_API_KEY: ${OPENCLAW_ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENCLAW_OPENAI_API_KEY:-}
      # ── OpenClaw gateway / hook auth (resolved into openclaw.json by
      #    the config generator, but the gateway also reads these from
      #    the process environment at runtime for hot-reload) ──────────
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_HOOK_TOKEN: ${OPENCLAW_HOOK_TOKEN:-}
      # ── Operator plugin reverse-call credentials ───────────────────
      REDDWARF_OPERATOR_TOKEN: ${REDDWARF_OPERATOR_TOKEN:-}
      REDDWARF_API_URL: ${REDDWARF_OPENCLAW_OPERATOR_API_URL:-http://host.docker.internal:8080}
      REDDWARF_OPENCLAW_OPERATOR_API_URL: ${REDDWARF_OPENCLAW_OPERATOR_API_URL:-http://host.docker.internal:8080}
      # ── Workspace paths ────────────────────────────────────────────
      REDDWARF_POLICY_ROOT: ${REDDWARF_POLICY_ROOT:-/opt/reddwarf}
      REDDWARF_WORKSPACE_ROOT: ${REDDWARF_WORKSPACE_ROOT:-/var/lib/reddwarf/workspaces}
      REDDWARF_EVIDENCE_ROOT: ${REDDWARF_EVIDENCE_ROOT:-/var/lib/reddwarf/evidence}
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      # ── Discord (optional, only needed when Discord channel is enabled) ─
      OPENCLAW_DISCORD_BOT_TOKEN: ${OPENCLAW_DISCORD_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_HOST_PORT:-3578}:18789"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    volumes:
      - ${REDDWARF_POLICY_SOURCE_ROOT:-../../}:${REDDWARF_POLICY_ROOT:-/opt/reddwarf}:ro
      - ./openclaw.json:/etc/openclaw/openclaw.json:ro
      - ../../runtime-data/openclaw-home:/home/node/.openclaw
      - ../../runtime-data/workspaces:${REDDWARF_WORKSPACE_ROOT:-/var/lib/reddwarf/workspaces}
      - runtime-evidence:${REDDWARF_EVIDENCE_ROOT:-/var/lib/reddwarf/evidence}
      # Package-manager and runtime caches. Empty (and effectively free) on
      # the upstream image; populated by the toolchain image's `mise install`
      # and any per-project `bundle install` / `npm install` / etc. Mounting
      # them unconditionally means the first task on any stack pays the
      # install cost, and every subsequent task of the same stack hits the
      # cache instead of the developer-phase wall-clock budget. Stack-
      # agnostic — adding Go, Rust, Java, Elixir, or anything else to a
      # generated app does not require editing this list.
      - openclaw-mise-runtimes:/home/node/.local/share/mise
      - openclaw-mise-downloads:/home/node/.cache/mise
      - openclaw-npm-cache:/home/node/.npm
      - openclaw-pnpm-store:/home/node/.local/share/pnpm
      - openclaw-yarn-cache:/home/node/.cache/yarn
      - openclaw-bundle-cache:/home/node/.bundle
      - openclaw-gem-cache:/home/node/.gem
      - openclaw-pip-cache:/home/node/.cache/pip
      - openclaw-cargo-cache:/home/node/.cargo
      - openclaw-go-modcache:/home/node/go

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ../../.env
      - ../../.secrets
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reddwarf}
      POSTGRES_USER: ${POSTGRES_USER:-reddwarf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reddwarf}
    ports:
      - "${POSTGRES_HOST_PORT:-55532}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reddwarf} -d ${POSTGRES_DB:-reddwarf}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  runtime-evidence:
  # Package-manager caches and mise-installed runtimes. See the openclaw
  # service block for why these are mounted unconditionally.
  openclaw-mise-runtimes:
  openclaw-mise-downloads:
  openclaw-npm-cache:
  openclaw-pnpm-store:
  openclaw-yarn-cache:
  openclaw-bundle-cache:
  openclaw-gem-cache:
  openclaw-pip-cache:
  openclaw-cargo-cache:
  openclaw-go-modcache:
